<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <title>Registro</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-dark">

<form class="p-4 text-white" style="max-width: 400px; width: 100%;" action="backend/registro.php" method="POST">

  <div class="mb-4">
    <input type="text" name="usuario" class="form-control" placeholder="Usuario" required />
  </div>

  <div class="mb-4">
    <input type="password" name="password" class="form-control" placeholder="Password" required />
  </div>

  <div class="mb-4">
    <select name="tipo" class="form-select">
      <option value="T">Mecánica</option>
      <option value="R">Ropa</option>
    </select>
  </div>

  <button type="submit" class="btn btn-primary w-100 mb-4">Registrarse</button>

  <div class="text-center">
    <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>


    <i class="fab fa-facebook-f mx-2"></i>
    <i class="fab fa-google mx-2"></i>
    <i class="fab fa-twitter mx-2"></i>
    <i class="fab fa-github mx-2"></i>
  </div>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
